services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - cp_storage:/app/storage
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cp_generator
      POSTGRES_USER: cp_user
      POSTGRES_PASSWORD: cp_password
    volumes:
      - cp_postgres:/var/lib/postgresql/data

volumes:
  cp_storage:
  cp_postgres:
