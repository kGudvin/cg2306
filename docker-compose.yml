services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - cp_storage:/app/storage
    depends_on:
      - db
    networks:
      default:
      web:
        aliases:
          - cg2306-app

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cp_generator
      POSTGRES_USER: cp_user
      POSTGRES_PASSWORD: cp_password
    volumes:
      - cp_postgres:/var/lib/postgresql/data

volumes:
  cp_storage:
  cp_postgres:

networks:
  web:
    external: true
